name: "Publish Release"

on:
  push:
    branches:
      - main # 如果你的主分支是 master，请在此处修改

jobs:
  publish-tauri:
    permissions:
      contents: write
    runs-on: macos-latest
    env:
      # 消除 Node.js 20 弃用警告
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: "macos-latest"
            args: "--bundles dmg"

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Install Bun
        uses: oven-sh/setup-bun@v2

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: "aarch64-apple-darwin, x86_64-apple-darwin"

      - name: Install FFmpeg
        run: brew install ffmpeg

      - name: Install dependencies
        run: bun install

      - name: Generate Videos
        run: bun run videos -- --platform macos

      - name: Fix Permissions and Cleanup
        run: |
          rm -rf src-tauri/target
          mkdir -p src-tauri/target/release/bundle/dmg/
          chmod -R +x .

      - name: Build Application Bundle
        # 先编译出 .app 文件，但不发布，方便我们下一步“开箱”
        run: bun tauri build --bundles app

      - name: Inspect Package Content
        # 【核心步骤】在这里通过日志查看安装包里到底有没有猫
        run: |
          echo "=========================================="
          echo "正在检查生成的 macOS App 资源目录清单..."
          echo "目标路径: Contents/Resources"
          echo "=========================================="
          # 递归列出 .app 内部 Resources 文件夹下的所有文件
          ls -R src-tauri/target/release/bundle/macos/*.app/Contents/Resources
          echo "=========================================="

      - name: Build and Release
        # 这一步会利用上面编译好的结果，打成 dmg 并上传到 GitHub Release
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: v__VERSION__
          releaseName: "Kitty Screen v__VERSION__"
          releaseBody: "这是为您生成的 macOS 通用版 (.dmg)。"
          releaseDraft: true
          prerelease: false
          args: ${{ matrix.args }}
