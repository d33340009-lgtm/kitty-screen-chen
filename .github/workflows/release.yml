name: "Publish Release"

on:
  push:
    branches:
      - main

# 1. 核心权限设置：必须有这些权限，GitHub Actions 才能发布网页
permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  publish-tauri:
    runs-on: macos-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Install Bun
        uses: oven-sh/setup-bun@v2

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: "aarch64-apple-darwin, x86_64-apple-darwin"

      - name: Install FFmpeg
        run: brew install ffmpeg

      - name: Install dependencies
        run: bun install

      - name: Generate Videos
        run: bun run videos -- --platform macos

      # 2. 编译网页产物：这一步会生成 dist 文件夹
      - name: Build Frontend
        run: bun run build

      # 3. 上传网页数据：为部署 Pages 做准备
      - name: Upload Pages Artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./dist

      - name: Fix Permissions and Cleanup
        run: |
          rm -rf src-tauri/target
          mkdir -p src-tauri/target/release/bundle/dmg/
          chmod -R +x .

      - name: Build and Release
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: v__VERSION__
          releaseName: "Kitty Screen v__VERSION__"
          releaseBody: "这是为您生成的 macOS 通用版 (.dmg)。"
          releaseDraft: true
          prerelease: false
          args: "--bundles dmg"

  # 4. 新增任务：专门负责把网页挂到公网上
  deploy-pages:
    needs: publish-tauri
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
