name: "Publish Release"

on:
  push:
    branches:
      - main # 如果你的主分支是 master，请在此处修改

jobs:
  publish-tauri:
    permissions:
      contents: write
    runs-on: macos-latest
    env:
      # 消除 Node.js 20 弃用警告
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: "macos-latest"
            # 简化参数，让 Tauri 自动识别配置
            args: "--bundles dmg"

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Install Bun
        uses: oven-sh/setup-bun@v2

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          # 下载双架构支持，确保打包通用版
          targets: "aarch64-apple-darwin, x86_64-apple-darwin"

      - name: Install FFmpeg
        run: brew install ffmpeg

      - name: Install dependencies
        run: bun install

      - name: Generate Videos
        # 此时你应该已经在脚本里使用了 HEVC 或 ProRes 4444 瘦身逻辑
        run: bun run videos -- --platform macos

      - name: Fix Permissions and Cleanup
        # 核心修复：强行赋予目录权限，并删除可能导致冲突的本地 target 文件夹
        run: |
          rm -rf src-tauri/target
          mkdir -p src-tauri/target/release/bundle/dmg/
          chmod -R +x .

      - name: Build and Release
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: v__VERSION__
          releaseName: "Kitty Screen v__VERSION__"
          releaseBody: "这是为您生成的 macOS 通用版 (.dmg)。"
          releaseDraft: true
          prerelease: false
          args: ${{ matrix.args }}
