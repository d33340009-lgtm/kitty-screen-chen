name: "Publish Release"

on:
  push:
    branches:
      - main # 确保你的主分支名字是 main，如果是 master 请修改此处

jobs:
  publish-tauri:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: "macos-latest"
            # 这里去掉了 args 里的 --target 参数，让 Tauri 自动处理通用打包
            args: "--bundles dmg --config src-tauri/tauri.macos.conf.json"

    runs-on: ${{ matrix.platform }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: lts/*

      - name: Install Bun
        uses: oven-sh/setup-bun@v2

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          # 核心修复：分别下载 Intel 和 Apple Silicon 的支持组件
          targets: "aarch64-apple-darwin, x86_64-apple-darwin"

      - name: Install FFmpeg
        run: brew install ffmpeg

      - name: Install dependencies
        run: bun install

      - name: Generate Videos
        # 现场在云端生成透明视频
        run: bun run videos -- --platform macos

      - name: Build and Release
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: v__VERSION__ # 自动从 package.json 获取版本号
          releaseName: "Kitty Screen v__VERSION__"
          releaseBody: "这是为您生成的 macOS 通用版 (.dmg)，兼容 Intel 和 M1/M2/M3 芯片。"
          releaseDraft: true
          prerelease: false
          args: ${{ matrix.args }}
